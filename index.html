<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cofre do Casal</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { background: #0d9488; color: white; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.4); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
        <div class="w-full max-w-sm space-y-8">
            <div class="text-center">
                <div class="inline-flex bg-teal-600 text-white p-5 rounded-[2rem] text-4xl mb-4 shadow-2xl">💍</div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Cofre do Casal</h1>
                <p class="text-slate-400 font-medium">Finanças sincronizadas</p>
            </div>
            <div class="bg-white border border-slate-100 p-2 rounded-[2.5rem] shadow-sm">
                <div class="p-6 space-y-4">
                    <input type="email" id="email" placeholder="E-mail do casal" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                    <input type="password" id="password" placeholder="Senha" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                    <div id="auth-msg" class="hidden p-4 rounded-xl bg-rose-50 text-rose-600 text-xs font-bold text-center border border-rose-100"></div>
                    <button onclick="handleAuth('login')" class="w-full bg-teal-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-teal-700 active:scale-95 transition-all">ENTRAR</button>
                    <button onclick="handleAuth('signup')" class="w-full text-slate-400 text-[10px] font-black hover:text-teal-600 uppercase tracking-[0.2em] text-center block pt-2">Criar conta nova</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden flex flex-col min-h-screen">
        <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 p-6">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center text-white font-black text-xs">CC</div>
                    <h2 class="font-black text-xl text-slate-800 tracking-tighter">CofreCasal</h2>
                </div>
                <button onclick="logout()" class="text-rose-500 font-bold text-sm">Sair</button>
            </div>
        </header>

        <main class="max-w-xl mx-auto p-6 flex-1 w-full pb-32">
            <div id="tab-dash" class="tab-content active space-y-6">
                <div class="bg-teal-600 p-10 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                    <p class="text-xs font-bold uppercase tracking-widest opacity-60 mb-2">Saldo Atual</p>
                    <h3 id="dash-saldo" class="text-4xl font-black">R$ 0,00</h3>
                </div>
                <div id="lista-transacoes" class="space-y-3"></div>
            </div>

            <div id="tab-add" class="tab-content space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-4">
                    <input type="text" id="in-desc" placeholder="Descrição" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                    <input type="number" id="in-valor" placeholder="Valor R$" class="w-full p-4 bg-teal-50 border border-teal-100 rounded-2xl outline-none font-black text-teal-700">
                    <select id="in-cat" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none">
                        <option value="essencial">🏠 Essencial</option>
                        <option value="lazer">🍕 Lazer</option>
                        <option value="entrada">💰 Entrada</option>
                    </select>
                    <button onclick="saveTrans()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl active:scale-95 transition-all">SALVAR</button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-slate-200 p-2 rounded-full shadow-2xl flex gap-2">
            <button onclick="showTab('dash')" id="nav-dash" class="nav-active flex-1 py-4 rounded-full font-black text-[10px] uppercase tracking-widest transition-all">Painel</button>
            <button onclick="showTab('add')" id="nav-add" class="flex-1 py-4 rounded-full font-black text-[10px] uppercase tracking-widest text-slate-400 transition-all">Lançar</button>
        </nav>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU PROJETO (Extraída do seu print)
        const firebaseConfig = {
            apiKey: "AIzaSyA0s8LSMQKvEBUt2vk6MIhge0vBsPaO5cw",
            authDomain: "controle-gastos-financeiro-ia.firebaseapp.com",
            projectId: "controle-gastos-financeiro-ia",
            storageBucket: "controle-gastos-financeiro-ia.firebasestorage.app",
            messagingSenderId: "225160152309",
            appId: "1:225160152309:web:f861a726082c6abc1f71bc"
        };

        // Inicialização correta para Scripts Globais
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Monitor de Login
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').classList.remove('hidden');
                startSync(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');
            msg.classList.add('hidden');

            try {
                if (type === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch (err) {
                msg.innerText = err.message;
                msg.classList.remove('hidden');
            }
        }

        function startSync(uid) {
            db.collection('transacoes').where('userId', '==', uid).orderBy('data', 'desc')
            .onSnapshot(snap => {
                let total = 0;
                let html = "";
                snap.forEach(doc => {
                    const t = doc.data();
                    const isE = t.cat === 'entrada';
                    total += isE ? t.valor : -t.valor;
                    html += `<div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center">
                        <div class="font-bold text-slate-800">${t.desc}</div>
                        <div class="font-black ${isE ? 'text-teal-600' : 'text-rose-500'}">${isE ? '+' : '-'} R$ ${t.valor.toFixed(2)}</div>
                    </div>`;
                });
                document.getElementById('dash-saldo').innerText = "R$ " + total.toFixed(2);
                document.getElementById('lista-transacoes').innerHTML = html;
            });
        }

        async function saveTrans() {
            const desc = document.getElementById('in-desc').value;
            const valor = parseFloat(document.getElementById('in-valor').value);
            const cat = document.getElementById('in-cat').value;
            if (!desc || !valor) return alert("Preencha tudo!");

            await db.collection('transacoes').add({
                desc, valor, cat, data: Date.now(), userId: auth.currentUser.uid
            });
            document.getElementById('in-desc').value = "";
            document.getElementById('in-valor').value = "";
            showTab('dash');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-slate-400'));
            document.getElementById('nav-' + id).classList.add('nav-active');
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>

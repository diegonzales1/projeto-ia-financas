<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cofre Casal - Sincronizado</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .nav-active {
      background: #0d9488;
      color: white;
      box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.4);
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

  <!-- LOGIN SCREEN -->
  <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
    <div class="w-full max-w-sm space-y-8">
      <div class="text-center">
        <div class="inline-flex bg-teal-600 text-white p-5 rounded-[2rem] text-4xl mb-4 shadow-2xl">🔐</div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">Cofre do Casal</h1>
        <p class="text-slate-400 font-medium">Controlo financeiro em nuvem</p>
      </div>

      <div class="space-y-4">
        <input type="email" id="email" placeholder="E-mail do Casal" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition-all">
        <input type="password" id="password" placeholder="Palavra-passe" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition-all">

        <div id="auth-msg" class="hidden p-4 rounded-xl bg-rose-50 text-rose-600 text-xs font-bold text-center"></div>

        <button onclick="handleAuth('login')" class="w-full bg-teal-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-teal-700 active:scale-95 transition-all">ENTRAR</button>
        <button onclick="handleAuth('signup')" class="w-full text-slate-400 text-xs font-bold hover:text-teal-600 uppercase tracking-widest text-center block pt-2">Criar conta nova</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" class="hidden">
    <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 p-6">
      <div class="max-w-xl mx-auto flex justify-between items-center">
        <h2 class="font-black text-2xl text-teal-600 tracking-tighter">CofreCasal</h2>
        <button onclick="logout()" class="text-slate-300 hover:text-rose-500 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <main class="max-w-xl mx-auto p-6 space-y-6">
      <!-- DASHBOARD -->
      <div id="tab-dash" class="tab-content active space-y-6">
        <div class="bg-teal-600 p-10 rounded-[2.5rem] text-white shadow-2xl shadow-teal-200 relative overflow-hidden">
          <div class="relative z-10">
            <p class="text-xs font-bold uppercase tracking-widest opacity-60 mb-2">Saldo Sincronizado</p>
            <h3 id="dash-saldo" class="text-5xl font-extrabold tracking-tight">R$ 0,00</h3>
          </div>
          <div class="absolute -right-4 -bottom-4 text-white/10 text-9xl font-black italic">$$</div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Despesas</p>
            <p id="dash-gastos" class="text-xl font-black text-rose-500">R$ 0,00</p>
          </div>
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Poupado</p>
            <p id="dash-invest" class="text-xl font-black text-blue-500">R$ 0,00</p>
          </div>
        </div>

        <div class="space-y-4">
          <h4 class="font-black text-slate-800 text-lg">Histórico do Casal</h4>
          <div id="lista-transacoes" class="space-y-3"></div>
        </div>
      </div>

      <!-- ADD TRANSACTION -->
      <div id="tab-add" class="tab-content">
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-6">
          <h3 class="text-2xl font-black">Novo Lançamento</h3>
          <div class="space-y-4">
            <input type="text" id="in-desc" placeholder="O que foi?" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-teal-500">
            <input type="number" id="in-valor" placeholder="Valor R$" class="w-full p-4 bg-teal-50 border border-teal-100 rounded-2xl outline-none font-black text-teal-700 text-2xl">
            <select id="in-cat" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
              <option value="essencial">🏠 Essencial (Contas/Casa)</option>
              <option value="lazer">🍕 Lazer / Restaurantes</option>
              <option value="invest">📈 Investimentos / Poupança</option>
              <option value="entrada">💰 Salário / Outras Entradas</option>
            </select>
            <button onclick="saveTrans()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">Gravar agora</button>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER NAV -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-slate-200 p-2 rounded-[2rem] shadow-2xl flex gap-2 z-50">
      <button onclick="showTab('dash')" id="nav-dash" class="nav-active flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-tighter transition-all">Painel</button>
      <button onclick="showTab('add')" id="nav-add" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-tighter text-slate-400 transition-all">Novo Gasto</button>
    </nav>
  </div>
 
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA0s8LSMQKvEBUt2vk6MIhge0vBsPaO5cw",
      authDomain: "controle-gastos-financeiro-ia.firebaseapp.com",
      projectId: "controle-gastos-financeiro-ia",
      storageBucket: "controle-gastos-financeiro-ia.firebasestorage.app",
      messagingSenderId: "225160152309",
      appId: "1:225160152309:web:f861a726082c6abc1f71bc",
      measurementId: "G-83LJ24TXCC"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Listener de Login
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        syncData(user.uid);
      } else {
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('app-screen').classList.add('hidden');
      }
    });

    async function handleAuth(mode) {
      const e = document.getElementById('email').value;
      const p = document.getElementById('password').value;
      const msg = document.getElementById('auth-msg');
      msg.classList.add('hidden');

      if (!e || !p) return alert("Preenche os dados!");

      try {
        if (mode === 'login') await auth.signInWithEmailAndPassword(e, p);
        else await auth.createUserWithEmailAndPassword(e, p);
      } catch (err) {
        msg.innerText = "Erro: " + err.message;
        msg.classList.remove('hidden');
      }
    }

    function syncData(uid) {
      db.collection('users').doc(uid).collection('history')
        .orderBy('time', 'desc').onSnapshot(snap => {
          let saldo = 0, gastos = 0, invest = 0, html = "";

          snap.forEach(doc => {
            const t = doc.data();
            const isIn = t.cat === 'entrada';
            saldo += isIn ? t.valor : -t.valor;
            if (!isIn) {
              gastos += t.valor;
              if (t.cat === 'invest') invest += t.valor;
            }

            html += `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-xl">
                                    ${t.cat === 'entrada' ? '💰' : t.cat === 'invest' ? '📈' : t.cat === 'lazer' ? '🍕' : '🏠'}
                                </div>
                                <div>
                                    <p class="font-bold text-slate-800">${t.desc}</p>
                                    <p class="text-[10px] text-slate-300 font-bold uppercase">${new Date(t.time).toLocaleDateString('pt-PT')}</p>
                                </div>
                            </div>
                            <p class="font-black text-lg ${isIn ? 'text-teal-600' : 'text-rose-500'}">
                                ${isIn ? '+' : '-'} R$ ${t.valor.toLocaleString('pt-PT', { minimumFractionDigits: 2 })}
                            </p>
                        </div>
                    `;
          });

          document.getElementById('dash-saldo').innerText = "R$ " + saldo.toLocaleString('pt-PT', { minimumFractionDigits: 2 });
          document.getElementById('dash-gastos').innerText = "R$ " + gastos.toLocaleString('pt-PT', { minimumFractionDigits: 2 });
          document.getElementById('dash-invest').innerText = "R$ " + invest.toLocaleString('pt-PT', { minimumFractionDigits: 2 });
          document.getElementById('lista-transacoes').innerHTML = html || "<p class='text-center py-10 text-slate-300 font-bold italic'>Ainda não há lançamentos.</p>";
        }, err => {
          console.log("Aguardando ativação das regras do Firestore...");
        });
    }

    async function saveTrans() {
      const desc = document.getElementById('in-desc').value;
      const valor = parseFloat(document.getElementById('in-valor').value);
      const cat = document.getElementById('in-cat').value;

      if (!desc || !valor) return alert("Preenche a descrição e o valor!");

      await db.collection('users').doc(auth.currentUser.uid).collection('history').add({
        desc, valor, cat, time: Date.now()
      });

      document.getElementById('in-desc').value = "";
      document.getElementById('in-valor').value = "";
      showTab('dash');
    }

    function showTab(id) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-slate-400'));
      document.getElementById('nav-' + id).classList.add('nav-active');
    }

    function logout() { auth.signOut(); }
  </script>
</body>

</html>

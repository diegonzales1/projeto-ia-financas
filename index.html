<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cofre do Casal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat SDKs (Mais estáveis para este tipo de projeto) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-active { background: #0d9488; color: white; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.4); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- TELA DE LOGIN -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6">
        <div class="w-full max-w-sm space-y-8">
            <div class="text-center">
                <div class="inline-flex bg-teal-600 text-white p-5 rounded-[2rem] text-4xl mb-4 shadow-2xl">💍</div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Cofre do Casal</h1>
                <p class="text-slate-400 font-medium">Finanças sincronizadas</p>
            </div>
            
            <div class="bg-white border border-slate-100 p-2 rounded-[2.5rem] shadow-sm">
                <div class="p-6 space-y-4">
                    <input type="email" id="email" placeholder="E-mail do casal" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                    <input type="password" id="password" placeholder="Senha" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                    
                    <div id="auth-msg" class="hidden p-4 rounded-xl bg-rose-50 text-rose-600 text-xs font-bold text-center border border-rose-100"></div>

                    <button onclick="handleAuth('login')" id="btn-login" class="w-full bg-teal-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-teal-700 active:scale-95 transition-all">ENTRAR</button>
                    <button onclick="handleAuth('signup')" class="w-full text-slate-400 text-[10px] font-black hover:text-teal-600 uppercase tracking-[0.2em] text-center block pt-2">Criar conta nova</button>
                </div>
            </div>
            <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-widest">Acesso Seguro via Firebase</p>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-screen" class="hidden flex flex-col min-h-screen">
        <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 p-6">
            <div class="max-w-xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center text-white font-black text-xs">CC</div>
                    <h2 class="font-black text-xl text-slate-800 tracking-tighter">CofreCasal</h2>
                </div>
                <button onclick="logout()" class="text-slate-300 hover:text-rose-500 transition-colors">
                    Sair
                </button>
            </div>
        </header>

        <main class="max-w-xl mx-auto p-6 flex-1 w-full pb-32">
            <!-- ABA DASHBOARD -->
            <div id="tab-dash" class="tab-content active space-y-6">
                <div class="bg-teal-600 p-10 rounded-[2.5rem] text-white shadow-2xl shadow-teal-100 relative overflow-hidden">
                    <p class="text-xs font-bold uppercase tracking-widest opacity-60 mb-2">Saldo do Casal</p>
                    <h3 id="dash-saldo" class="text-5xl font-black tracking-tight">R$ 0,00</h3>
                    <div class="absolute -right-6 -bottom-6 opacity-10 text-9xl font-black">R$</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-3xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Gastos</p>
                        <p id="dash-gastos" class="text-xl font-black text-rose-500">R$ 0,00</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl border border-slate-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Entradas</p>
                        <p id="dash-entradas" class="text-xl font-black text-teal-600">R$ 0,00</p>
                    </div>
                </div>

                <div class="space-y-4">
                    <h4 class="font-black text-slate-800 text-lg flex justify-between items-center">
                        Últimos Lançamentos
                        <span class="text-[10px] text-slate-400 uppercase tracking-widest">Nuvem ativa</span>
                    </h4>
                    <div id="lista-transacoes" class="space-y-3">
                        <!-- Itens aqui -->
                    </div>
                </div>
            </div>

            <!-- ABA ADICIONAR -->
            <div id="tab-add" class="tab-content space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-6">
                    <h3 class="text-2xl font-black text-slate-800">Novo Registro</h3>
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Descrição</label>
                            <input type="text" id="in-desc" placeholder="Ex: Mercado, Aluguel..." class="w-full p-5 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-teal-500">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Valor R$</label>
                            <input type="number" id="in-valor" placeholder="0.00" class="w-full p-5 bg-teal-50 border border-teal-100 rounded-2xl outline-none font-black text-teal-700 text-3xl">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Categoria</label>
                            <select id="in-cat" class="w-full p-5 bg-slate-50 border border-slate-100 rounded-2xl outline-none appearance-none">
                                <option value="essencial">🏠 Essencial / Casa</option>
                                <option value="lazer">🍕 Lazer / Comida</option>
                                <option value="investimento">📈 Investimento</option>
                                <option value="entrada">💰 Salário / Renda</option>
                            </select>
                        </div>
                        <button onclick="saveTrans()" class="w-full bg-slate-900 text-white font-black py-6 rounded-2xl shadow-xl active:scale-95 transition-all">SALVAR NA NUVEM</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- NAVEGAÇÃO -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-sm bg-white/90 backdrop-blur-xl border border-white/20 p-2 rounded-[2rem] shadow-2xl flex gap-2 z-50">
            <button onclick="showTab('dash')" id="nav-dash" class="nav-active flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest transition-all">Painel</button>
            <button onclick="showTab('add')" id="nav-add" class="flex-1 py-4 rounded-[1.5rem] font-black text-[10px] uppercase tracking-widest text-slate-400 transition-all">Lançar</button>
        </nav>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        const firebaseConfig = {
            apiKey: "AIzaSyA0s8LSMQKvEBut2vk6MIhge0vBspa05cw",
            authDomain: "controle-gastos-financeiro-ia.firebaseapp.com",
            projectId: "controle-gastos-financeiro-ia",
            storageBucket: "controle-gastos-financeiro-ia.firebasestorage.app",
            messagingSenderId: "225160152309",
            appId: "1:225160152309:web:f861a726082c6abc1f71bc"
        };

        // Inicialização Segura
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Monitor de Estado
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').classList.remove('hidden');
                startSync(user.uid);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        // Login e Cadastro
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');
            msg.classList.add('hidden');

            if (!email || !pass) return alert("Preencha todos os campos!");

            try {
                if (type === 'login') {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                }
            } catch (err) {
                console.error(err);
                let errorMessage = "Erro na chave da API. Aguarde 5-10 minutos para o Google ativar seu projeto.";
                if (err.code !== "auth/api-key-not-valid") errorMessage = err.message;
                
                msg.innerText = errorMessage;
                msg.classList.remove('hidden');
            }
        }

        // Sincronização em Tempo Real (Firestore)
        function startSync(uid) {
            db.collection('users').doc(uid).collection('transacoes')
                .orderBy('data', 'desc')
                .onSnapshot(snap => {
                    let totalS = 0, totalG = 0, totalE = 0;
                    let html = "";

                    snap.forEach(doc => {
                        const t = doc.data();
                        const isE = t.cat === 'entrada';
                        
                        if(isE) {
                            totalE += t.valor;
                            totalS += t.valor;
                        } else {
                            totalG += t.valor;
                            totalS -= t.valor;
                        }

                        html += `
                            <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-xl">
                                        ${t.cat==='entrada'?'💰':t.cat==='investimento'?'📈':t.cat==='lazer'?'🍕':'🏠'}
                                    </div>
                                    <div>
                                        <p class="font-bold text-slate-800">${t.desc}</p>
                                        <p class="text-[9px] font-black text-slate-300 uppercase tracking-tighter">${new Date(t.data).toLocaleDateString('pt-BR')}</p>
                                    </div>
                                </div>
                                <p class="font-black ${isE?'text-teal-600':'text-rose-500'}">
                                    ${isE?'+':'-'} R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits:2})}
                                </p>
                            </div>
                        `;
                    });

                    document.getElementById('dash-saldo').innerText = "R$ " + totalS.toLocaleString('pt-BR', {minimumFractionDigits:2});
                    document.getElementById('dash-gastos').innerText = "R$ " + totalG.toLocaleString('pt-BR', {minimumFractionDigits:2});
                    document.getElementById('dash-entradas').innerText = "R$ " + totalE.toLocaleString('pt-BR', {minimumFractionDigits:2});
                    document.getElementById('lista-transacoes').innerHTML = html || "<p class='text-center py-10 text-slate-300 font-bold italic'>Nenhum lançamento encontrado.</p>";
                }, err => {
                    console.log("Aguardando permissões do banco...");
                });
        }

        // Salvar Transação
        async function saveTrans() {
            const desc = document.getElementById('in-desc').value;
            const valor = parseFloat(document.getElementById('in-valor').value);
            const cat = document.getElementById('in-cat').value;

            if (!desc || isNaN(valor)) return alert("Dados inválidos!");

            try {
                await db.collection('users').doc(auth.currentUser.uid).collection('transacoes').add({
                    desc, valor, cat, data: Date.now()
                });
                document.getElementById('in-desc').value = "";
                document.getElementById('in-valor').value = "";
                showTab('dash');
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active', 'text-slate-400'));
            document.getElementById('nav-' + id).classList.add('nav-active');
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
